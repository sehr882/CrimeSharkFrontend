<div class="navbar">

  <div class="logo">
    <img src="assets/cs-logo.png" class="logo-img" />
    <span class="logo-text">CrimeShark</span>
  </div>

  <nav class="menu">
    <a routerLink="/citizen" routerLinkActive="active">
      <span class="material-icons-outlined">dashboard</span>
      Home
    </a>

    <a routerLink="/citizen/live-map" routerLinkActive="active">
      <span class="material-icons-outlined">local_fire_department</span>
      Hotzones
    </a>

    <a routerLink="/citizen/safety-tips" routerLinkActive="active">
      <span class="material-icons-outlined">security</span>
      Safety Tips
    </a>

    <a (click)="goTomyreports()">
      <span class="material-icons-outlined">history</span>
      My Reports
    </a>

  </nav>

  <div class="auth">
    <a *ngIf="!isLoggedIn" class="login-btn" routerLink="/citizen/auth">
      Login / Sign Up
    </a>

    <div *ngIf="isLoggedIn" class="user-section">

      <div class="user-name">
        <span class="material-icons-outlined">account_circle</span>
        {{ loggedInUsername }}
      </div>

      <button class="login-btn logout-btn" (click)="logout()">
        <span class="material-icons-outlined">logout</span>
        Logout
      </button>

    </div>

  </div>

  <button class="report-btn" (click)="goToReport()">
    <span class="material-icons-outlined">add</span>
    Report a Crime
  </button>

</div>
