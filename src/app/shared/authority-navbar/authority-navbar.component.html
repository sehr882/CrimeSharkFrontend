<div class="navbar">

  <div class="logo">
    <img src="assets/cs-logo.png" class="logo-img" />
    <span class="logo-text">CrimeShark</span>
  </div>

  <nav class="menu">

    <a routerLink="/authority" routerLinkActive="active">
      <span class="material-icons-outlined">dashboard</span>Home
    </a>

    <a routerLink="/authority/reports" routerLinkActive="active">
      <span class="material-icons-outlined">report</span>Reports Management
    </a>

    <a routerLink="/authority/case-assignment" routerLinkActive="active">
      <span class="material-icons-outlined">assignment_ind</span>Case Assignment
    </a>

    <!-- 🔥 ROLE BASED MENU -->
    <a routerLink="/authority/officers" routerLinkActive="active">
      <span class="material-icons-outlined">groups</span>
      {{ isSuperAdmin ? 'Officer Management' : 'My Profile' }}
    </a>

  </nav>

  <!-- USER INFO -->
  <div class="user-info">
    <span class="material-icons-outlined">account_circle</span>
    <div>
      <p class="user-name">{{ userName }}</p>
      <p class="user-role">{{ userRole }}</p>
    </div>
  </div>

</div>
