<div class="home-wrap">

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="logo-area">
      <img src="assets/cs-logo.png" class="logo-img" alt="CrimeShark Logo">
      <span class="logo-text">CrimeShark</span>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero-section">
    <div class="hero-content">
      <h1 class="title">
        Crime Never Sleeps.<br />
        <span>You Stay Alert.</span>
      </h1>

      <p class="subtitle">
        A real-time crime reporting and monitoring system built for citizens and law-enforcement authorities.
      </p>

      <div class="action-buttons">
        <button routerLink="/citizen" class="btn citizen-btn">
          Continue as Citizen
        </button>

        <button routerLink="/authority/login" class="btn authority-btn">
          Authority Access
        </button>
      </div>
    </div>
  </section>

  <!-- CRIME IMAGES SECTION -->
  <section class="crime-showcase">
    <div class="crime-card">
      <img src="assets/cs-robbery.png" alt="Robbery">
      <div class="label">Robbery</div>
    </div>

    <div class="crime-card">
      <img src="assets/cs-narcotics.png" alt="Narcotics">
      <div class="label">Narcotics</div>
    </div>

    <div class="crime-card">
      <img src="assets/cs-burglary.png" alt="Burglary">
      <div class="label">Burglary</div>
    </div>

    <div class="crime-card">
      <img src="assets/cs-cybercrime.png" alt="Cyber Crime">
      <div class="label">Cyber Crime</div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    © 2025 CrimeShark — Vigilance. Protection. Trust.
  </footer>

</div>
