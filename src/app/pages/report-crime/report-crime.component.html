<div class="report-page">

  <div class="form-container">

    <h2 class="page-title">Report a Crime</h2>

    <div class="form-box">

      <!-- Crime Type -->
      <div class="form-field">
        <label class="field-label">Crime Type</label>
        <!-- only real options (no placeholder) -->
        <select name="crimeType" [(ngModel)]="crimeType" (change)="updateCrimeOptions()" class="field-input">
  <option value="static">Static</option>
  <option value="moving">Moving</option>
</select>
      </div>

      <!-- Crime -->
      <div class="form-field">
        <label class="field-label">Crime</label>
        <!-- disabled while no options; first option is a non-selectable placeholder -->
        <select name="selectedCrime" [(ngModel)]="selectedCrime" [disabled]="crimeOptions.length === 0" class="field-input">
  <option value="" disabled selected *ngIf="crimeOptions.length === 0">Select crime...</option>
  <option *ngFor="let crime of crimeOptions" [value]="crime">{{ crime }}</option>
</select>
      </div>

      <!-- Description -->
      <div class="form-field">
        <label class="field-label">Description</label>
        <textarea rows="4" [(ngModel)]="description" class="field-input textarea-input" placeholder="Describe what happened..."></textarea>
      </div>

      <!-- Evidence -->
      <div class="form-field">
        <label class="field-label">Evidence (optional)</label>
        <input type="file" (change)="onFileSelected($event)" class="file-input" />
      </div>

      <!-- Submit -->
      <button class="submit-btn" (click)="submitReport()">Submit Report</button>

    </div>

  </div>

</div>
