<div class="report-page">

  <div class="form-container">

    <h2 class="page-title">Report a Crime</h2>

    <div class="form-box">

      <!-- Crime Type -->
      <div class="form-field">
        <label class="field-label">Crime Type</label>

        <select
          name="crimeType"
          [(ngModel)]="crimeType"
          (ngModelChange)="updateCrimeOptions()"
          class="field-input"
        >
          <!-- disabled placeholder (not selectable) -->
          <option value="" disabled [selected]="!crimeType">-- Choose type --</option>
          <option value="static">Static</option>
          <option value="moving">Moving</option>
        </select>
      </div>

      <!-- Crime -->
      <div class="form-field">
        <label class="field-label">Crime</label>

        <select
          name="selectedCrime"
          [(ngModel)]="selectedCrime"
          [disabled]="crimeOptions.length === 0"
          class="field-input"
        >
          <option *ngIf="crimeOptions.length === 0" value="" disabled>
            Select crime...
          </option>

          <option *ngFor="let crime of crimeOptions; let i = index" [value]="crime">
            {{ i + 1 }}. {{ crime }}
          </option>
        </select>
      </div>

      <!-- Area of Crime -->
      <div class="form-field">
        <label class="field-label">Area of Crime</label>
        <input
          type="text"
          name="crimeArea"
          [(ngModel)]="crimeArea"
          class="field-input"
          placeholder="e.g. Liberty Market, Saddar, Clifton..."
        />
      </div>

      <!-- Description -->
      <div class="form-field">
        <label class="field-label">Description</label>
        <textarea
          name="description"
          rows="4"
          [(ngModel)]="description"
          class="field-input textarea-input"
          placeholder="Describe what happened..."
        ></textarea>
      </div>

      <!-- Evidence Upload -->
      <div class="form-field">
        <label class="field-label">Evidence (optional)</label>
        <input type="file" (change)="onFileSelected($event)" class="file-input" />
      </div>

      <!-- Submit Button -->
      <button class="submit-btn" (click)="submitReport()">Submit Report</button>

    </div>

  </div>

</div>
