<div class="report-details">

  <div class="header">
    <h2>Report Details</h2>
    <span class="badge pending">Pending</span>
  </div>

  <section class="card">
    <h3>Incident Information</h3>

    <div class="row">
      <label>Report ID</label>
      <span>CR-1021</span>
    </div>

    <div class="row">
      <label>Crime Type</label>
      <span>Robbery</span>
    </div>

    <div class="row">
      <label>Location</label>
      <span>Model Town, Lahore</span>
    </div>

    <div class="row">
      <label>Date & Time</label>
      <span>21 Jan 2026 — 10:30 PM</span>
    </div>
  </section>

  <section class="card">
    <h3>Reported By</h3>

    <div class="row">
      <label>Name</label>
      <span>Citizen (Anonymous)</span>
    </div>

    <div class="row">
      <label>Contact</label>
      <span>Hidden</span>
    </div>
  </section>

  <section class="card">
    <h3>Description</h3>
    <p>
      Two armed individuals snatched mobile phones near the market.
      CCTV footage is available.
    </p>
  </section>

  <section class="card">
    <h3>Authority Action</h3>

    <select>
      <option>Pending</option>
      <option>Verified</option>
      <option>Resolved</option>
    </select>

    <textarea placeholder="Add remarks..."></textarea>

    <button class="save">Update Report</button>
  </section>
