<app-back-button></app-back-button>

<div class="reports-page">

  <div class="page-header">
    <h1>Reports Management</h1>
    <p>View, track, and manage reported crimes</p>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input 
      type="text" 
      placeholder="Search by crime or location" 
      [(ngModel)]="search" 
    />

    <select [(ngModel)]="statusFilter">
      <option value="">All Status</option>
      <option value="PENDING">Pending</option>
      <option value="IN_REVIEW">In Review</option>
      <option value="CLOSED">Closed</option>
    </select>
  </div>

  <!-- Reports Table -->
  <div class="reports-table">

    <!-- Header -->
    <div class="table-head">
      <span>Case ID</span>
      <span>Crime Type</span>
      <span>Location</span>
      <span>Date</span>
      <span>Status</span>
      <span>Action</span>
    </div>

    <!-- Rows -->
    <div class="table-row" *ngFor="let r of filteredReports()">

      <span>#{{ r._id }}</span>

      <span>{{ r.crimeType }}</span>

      <span>{{ r.location }}</span>

      <span>{{ r.dateOfCrime | date:'yyyy-MM-dd' }}</span>

      <span 
        class="status"
        [class.pending]="r.status === 'PENDING'"
        [class.in-review]="r.status === 'IN_REVIEW'"
        [class.closed]="r.status === 'CLOSED'">
        {{ r.status }}
      </span>

      <span>
        <button 
          class="view-btn"
          (click)="viewReport(r._id)">
          View
        </button>
      </span>

    </div>

  </div>

</div>
