<app-back-button></app-back-button>

<div class="reports-page">

  <div class="page-header">
    <h1>Reports Management</h1>
    <p>View, track, and manage reported crimes</p>
  </div>

  <!-- Filters -->
  <div class="filters">

    <input
      type="text"
      placeholder="Search by crime or location"
      [(ngModel)]="search"
      (ngModelChange)="onSearchChange()"
    />

    <select
      [(ngModel)]="statusFilter"
      (ngModelChange)="onStatusChange()"
    >
      <option value="">All Status</option>
      <option value="PENDING">Pending</option>
      <option value="IN_PROGRESS">In Progress</option>
      <option value="RESOLVED">Resolved</option>
      <option value="REJECTED">Rejected</option>
    </select>

  </div>

  

  <!-- Table -->
  <div
    class="reports-table"
  >

    <div class="table-head">
      <span>Case ID</span>
      <span>Crime Type</span>
      <span>Location</span>
      <span>Date</span>
      <span>Status</span>
      <span>Action</span>
    </div>

    <div
      class="table-row"
      *ngFor="
        let report of filteredReportsList;
        trackBy: trackByReportId
      "
    >

      <span>#{{ report._id }}</span>

      <span>{{ report.crimeType }}</span>

      <span>{{ report.location }}</span>

      <span>
        {{ report.dateOfCrime | date:'yyyy-MM-dd' }}
      </span>

      <span
        class="status"
        [class.pending]="report.status === 'PENDING'"
        [class.in-progress]="report.status === 'IN_PROGRESS'"
        [class.resolved]="report.status === 'RESOLVED'"
        [class.rejected]="report.status === 'REJECTED'"
      >
        {{ report.status }}
      </span>

      <span>
        <button
          class="view-btn"
          (click)="viewReport(report._id)"
        >
          View
        </button>
      </span>

    </div>

  </div>

</div>
