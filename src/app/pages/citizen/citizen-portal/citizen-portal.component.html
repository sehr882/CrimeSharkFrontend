<!-- ================= PAGE ================= -->
<div class="portal-wrap">

  <!-- 🔍 SEARCH BAR (DASHBOARD ONLY) -->
   <div class="dashboard-search">
    <input
      [(ngModel)]="search"
      placeholder="Search crimes (e.g. burglary, robbery...)"
      (keyup.enter)="onSearch()"
    />
    <button (click)="onSearch()">🔍</button>
  </div>

  <!-- ================= CATEGORIES ================= -->
  <section class="categories">
    <div class="category-pill" 
         *ngFor="let c of categories"
         [class.active]="selectedCategory === c"
         (click)="setCategory(c)">
      {{ c }}
    </div>
  </section>

  <main class="main-grid">
    <!-- left column: map + trending -->
    <aside class="left-col">
      <div class="map-card">
  <div id="mini-map" class="mini-map"></div>
</div>


      <div class="trending">
        <h3>Trending</h3>
        <div class="trend-card" *ngFor="let t of trending">
          <div class="trend-icon">⚠️</div>
          <div class="trend-body">
            <div class="trend-title">{{ t.title }}</div>
            <div class="trend-time">{{ t.when }}</div>
          </div>
        </div>

        <button class="see-details">See Details</button>
      </div>
    </aside>

    <!-- right column: feed -->
    <section class="right-col">
      <div class="feed-header">
        <div class="feed-title">Live Alerts</div>
      </div>

      <div class="alert-list">
        <article class="alert-card" *ngFor="let a of filteredAlerts()">
          <div class="alert-left">
            <div class="alert-icon">{{ a.icon }}</div>
          </div>

          <div class="alert-right">
            <h4 class="alert-title">{{ a.title }}</h4>
            <div class="alert-sub">{{ a.subtitle }}</div>

            <div class="alert-meta">
              <div class="meta-item">📍 {{ a.location }}</div>
              <div class="meta-item">👁️ {{ a.viewers }} people nearby viewed this alert</div>
            </div>
          </div>
        </article>
      </div>
      <div class="no-results" *ngIf="filteredAlerts().length === 0">
  ❌ No results found
</div>


      <div class="news-block">
        <div class="news-item">⚠️ 3 thefts reported near Liberty Market this week</div>
        <div class="news-item">🔔 Local police increased patrolling in your area</div>
      </div>
    </section>
  </main>

  <button class="report-btn" routerLink="/report">
  <div class="plus">+</div>
  <div class="report-text">Report a<br/>Crime</div>
</button>
</div>
