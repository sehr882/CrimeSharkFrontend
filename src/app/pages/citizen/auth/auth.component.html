<div class="auth-wrapper">
  <div class="auth-container">
    <div class="tabs">
      <span class="tab" [class.active]="isLogin" (click)="toggleTab(true)">Login</span>
      <span class="tab" [class.active]="!isLogin" (click)="toggleTab(false)">Sign Up</span>
    </div>

    <div class="tab-content">
      <app-login [hidden]="!isLogin" [key]="componentKey"></app-login>
      <app-signup [hidden]="isLogin" [key]="componentKey"></app-signup>
    </div>
  </div>
</div>
