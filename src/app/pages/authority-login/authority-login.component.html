<div class="authority-page">
  <div class="authority-card">

    <div class="auth-header">
      <h2>Authority Portal</h2>
      <p class="warning">Authorized Personnel Only</p>
    </div>

    <form>

      <div class="form-group">
        <label>CNIC</label>
        <input type="text" [(ngModel)]="cnic" name="cnic" placeholder="Enter CNIC (e.g., 12345-6789012-3)">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password">
      </div>

      <div class="form-group">
        <label>Authority Access Code</label>
        <input type="text" [(ngModel)]="accessCode" name="accessCode" placeholder="Enter authority access code">
      </div>

      <button type="button" (click)="login()" class="btn-login">
        Login
      </button>

    </form>

    <p class="danger-text">
      🛑 Unauthorized access is strictly prohibited.
    </p>

  </div>
</div>
