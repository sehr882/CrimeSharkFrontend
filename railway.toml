# Force Railway to use Nixpacks instead of Railpack.
# Railpack's Angular detector treats this as a static SPA and tries to copy
# /app/browser for Caddy serving — but this app is SSR (Node server), so the
# packaging step fails. Nixpacks + the sibling nixpacks.toml uses the plain
# Node provider, runs `npm run build`, then starts the SSR server.
[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run serve:ssr:crime-shark-frontend"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
